<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#06C755">
  <meta name="description" content="if(塾) 見学予約受付 - プログラミング教室の見学をオンラインで簡単に予約できます">
  <title>if(塾) 見学予約</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- ヘッダー -->
  <header class="app-header">
    <div class="header-inner">
      <div class="logo">
        <img src="assets/logo.png" alt="if(塾) ロゴ" class="logo-img">
      </div>
      <p class="header-subtitle">見学予約受付</p>
    </div>
    <div class="header-glow"></div>
  </header>

  <!-- タブナビゲーション -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="reserve" id="tab-reserve">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
        <line x1="16" y1="2" x2="16" y2="6" />
        <line x1="8" y1="2" x2="8" y2="6" />
        <line x1="3" y1="10" x2="21" y2="10" />
      </svg>
      <span>予約する</span>
    </button>
    <button class="tab-btn" data-tab="list" id="tab-list">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="8" y1="6" x2="21" y2="6" />
        <line x1="8" y1="12" x2="21" y2="12" />
        <line x1="8" y1="18" x2="21" y2="18" />
        <line x1="3" y1="6" x2="3.01" y2="6" />
        <line x1="3" y1="12" x2="3.01" y2="12" />
        <line x1="3" y1="18" x2="3.01" y2="18" />
      </svg>
      <span>予約一覧</span>
      <span class="badge" id="badge-count" style="display:none;">0</span>
    </button>
  </nav>

  <!-- メインコンテンツ -->
  <main class="main-content">

    <!-- 予約フォームパネル -->
    <section class="tab-panel active" id="panel-reserve">
      <div class="panel-header">
        <h1>見学予約フォーム</h1>
        <p>下記フォームに必要事項をご入力ください</p>
      </div>

      <form id="reservation-form" novalidate>
        <!-- 名前 -->
        <div class="form-group">
          <label for="input-name" class="form-label">
            <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            お名前
            <span class="required-badge">必須</span>
          </label>
          <input type="text" id="input-name" class="form-input" placeholder="例: 山田 太郎" autocomplete="name" required>
          <p class="error-message" id="error-name"></p>
        </div>

        <!-- 日付 -->
        <div class="form-group">
          <label for="input-date" class="form-label">
            <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
              <line x1="16" y1="2" x2="16" y2="6" />
              <line x1="8" y1="2" x2="8" y2="6" />
              <line x1="3" y1="10" x2="21" y2="10" />
            </svg>
            見学希望日
            <span class="required-badge">必須</span>
          </label>
          <input type="date" id="input-date" class="form-input" required>
          <p class="error-message" id="error-date"></p>
        </div>

        <!-- 時間 -->
        <div class="form-group">
          <label for="input-time" class="form-label">
            <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10" />
              <polyline points="12 6 12 12 16 14" />
            </svg>
            希望時間
            <span class="required-badge">必須</span>
          </label>
          <select id="input-time" class="form-input form-select" required>
            <option value="">時間を選択してください</option>
            <option value="10:00">10:00</option>
            <option value="11:00">11:00</option>
            <option value="13:00">13:00</option>
            <option value="14:00">14:00</option>
            <option value="15:00">15:00</option>
            <option value="16:00">16:00</option>
            <option value="17:00">17:00</option>
            <option value="18:00">18:00</option>
          </select>
          <p class="error-message" id="error-time"></p>
        </div>

        <!-- メモ -->
        <div class="form-group">
          <label for="input-memo" class="form-label">
            <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
            </svg>
            メモ
            <span class="optional-badge">任意</span>
          </label>
          <textarea id="input-memo" class="form-input form-textarea" placeholder="ご質問や気になることがあればお書きください"
            rows="3"></textarea>
        </div>

        <!-- 送信ボタン -->
        <button type="submit" class="submit-btn" id="submit-btn">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13" />
            <polygon points="22 2 15 22 11 13 2 9 22 2" />
          </svg>
          <span>予約を送信する</span>
        </button>
      </form>
    </section>

    <!-- 予約一覧パネル -->
    <section class="tab-panel" id="panel-list">
      <div class="panel-header">
        <h1>予約一覧</h1>
        <p>登録された見学予約の一覧です</p>
      </div>

      <div id="reservation-list" class="reservation-list">
        <!-- 動的に追加 -->
      </div>

      <div id="empty-state" class="empty-state" style="display: none;">
        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
          <line x1="16" y1="2" x2="16" y2="6" />
          <line x1="8" y1="2" x2="8" y2="6" />
          <line x1="3" y1="10" x2="21" y2="10" />
          <line x1="9" y1="14" x2="15" y2="14" />
        </svg>
        <p class="empty-text">予約はまだありません</p>
        <p class="empty-sub">「予約する」タブから見学予約ができます</p>
      </div>
    </section>

  </main>

  <!-- 完了モーダル -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-content">
      <div class="modal-check">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
          stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12" />
        </svg>
      </div>
      <h2 class="modal-title">予約完了!</h2>
      <p class="modal-message" id="modal-message">見学予約を受け付けました。</p>
      <button class="modal-btn" id="modal-close-btn">閉じる</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
